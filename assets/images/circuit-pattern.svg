<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="techGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A4CFF" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#00E5FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00FF8C" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  
  <!-- Lignes horizontales -->
  <g stroke="url(#techGradient)" stroke-width="1.5">
    <line x1="0" y1="100" x2="1000" y2="100" />
    <line x1="0" y1="300" x2="1000" y2="300" />
    <line x1="0" y1="500" x2="1000" y2="500" />
    <line x1="0" y1="700" x2="1000" y2="700" />
    <line x1="0" y1="900" x2="1000" y2="900" />
  </g>
  
  <!-- Lignes verticales -->
  <g stroke="url(#techGradient)" stroke-width="1.5">
    <line x1="100" y1="0" x2="100" y2="1000" />
    <line x1="300" y1="0" x2="300" y2="1000" />
    <line x1="500" y1="0" x2="500" y2="1000" />
    <line x1="700" y1="0" x2="700" y2="1000" />
    <line x1="900" y1="0" x2="900" y2="1000" />
  </g>
  
  <!-- Noeuds -->
  <g fill="#00E5FF" fill-opacity="0.7">
    <circle cx="100" cy="100" r="4" />
    <circle cx="100" cy="300" r="4" />
    <circle cx="100" cy="500" r="4" />
    <circle cx="100" cy="700" r="4" />
    <circle cx="100" cy="900" r="4" />
    
    <circle cx="300" cy="100" r="4" />
    <circle cx="300" cy="300" r="4" />
    <circle cx="300" cy="500" r="4" />
    <circle cx="300" cy="700" r="4" />
    <circle cx="300" cy="900" r="4" />
    
    <circle cx="500" cy="100" r="4" />
    <circle cx="500" cy="300" r="4" />
    <circle cx="500" cy="500" r="4" />
    <circle cx="500" cy="700" r="4" />
    <circle cx="500" cy="900" r="4" />
    
    <circle cx="700" cy="100" r="4" />
    <circle cx="700" cy="300" r="4" />
    <circle cx="700" cy="500" r="4" />
    <circle cx="700" cy="700" r="4" />
    <circle cx="700" cy="900" r="4" />
    
    <circle cx="900" cy="100" r="4" />
    <circle cx="900" cy="300" r="4" />
    <circle cx="900" cy="500" r="4" />
    <circle cx="900" cy="700" r="4" />
    <circle cx="900" cy="900" r="4" />
  </g>
  
  <!-- Chemins diagonaux -->
  <g stroke="#00FF8C" stroke-width="1.5" stroke-opacity="0.5" fill="none">
    <path d="M100,100 L300,300 L500,300 L700,500 L900,500" />
    <path d="M100,500 L300,700 L500,700 L700,900" />
    <path d="M100,900 L300,700 L500,500 L700,300 L900,100" />
    <path d="M100,300 L300,100 L500,100 L700,300" />
  </g>
  
  <!-- Puces spéciales -->
  <g fill="#3FFF6F" fill-opacity="0.8">
    <circle cx="300" cy="300" r="6" />
    <circle cx="700" cy="500" r="6" />
    <circle cx="500" cy="700" r="6" />
    <circle cx="100" cy="900" r="6" />
    <circle cx="900" cy="100" r="6" />
  </g>
</svg>
